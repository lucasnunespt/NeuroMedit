          <div class="feedback-options" data-feedback-options hidden>
            <button class="feedback-option" type="button" data-feedback-completed data-i18n="index_choice_lighter">Mais leve</button>
            <button class="feedback-option" type="button" data-feedback-completed data-i18n="index_choice_same">Igual</button>
            <button class="feedback-option" type="button" data-feedback-completed data-feedback-tense>Mais tenso</button>
          </div>

          <p class="feedback-thank-you" data-feedback-save-status data-feedback-thank-you data-i18n="feedback_thank_you" role="status" aria-live="polite" hidden>Thank you. Your response has been saved.</p>

          <div class="complete-actions" data-feedback-actions hidden>
            <a href="home.html" class="button primary-button" data-i18n="home_continue_cta">Continuar</a>
            <a href="index.html" class="feedback-text-link" data-feedback-repeat data-feedback-repeat-label>repetir sessão</a>

  <script src="translations-en.js"></script>
  <script src="translations-pt.js"></script>
  <script src="translations-it.js"></script>
  <script src="translations-es.js"></script>
  <script src="translations-ru.js"></script>
  <script>
    (() => {
      const params = new URLSearchParams(window.location.search);
      const source = params.get("source");
      const practice = params.get("practice");
      const isSleepFeedback = source === "sleep" && practice === "before-sleep";

      if (source === "index" || practice === "initial-pause") {
        document.body.classList.add("feedback-from-index", "feedback-atmosphere");
        document.querySelector("[data-feedback-repeat]")?.setAttribute("href", "index.html");
      }

      if (isSleepFeedback) {
        document.body.classList.add("feedback-atmosphere");
        const repeatLink = document.querySelector("[data-feedback-repeat]");
        repeatLink?.setAttribute("href", "sleep.html");
      }

      const question = document.querySelector("[data-feedback-question]");
      const options = document.querySelector("[data-feedback-options]");
      const saveStatus = document.querySelector("[data-feedback-save-status]");
      const feedbackCard = document.querySelector(".complete-card");
      const feedbackActions = document.querySelector("[data-feedback-actions]");
      question?.setAttribute("data-i18n", "index_choices_aria");

      if (options) {
        options.hidden = false;
        options.querySelectorAll("[data-feedback-completed]").forEach((button) => {
          button.hidden = false;
        });
      }

      function getFeedbackLanguage() {
        return localStorage.getItem("neuromedit-language")
          || localStorage.getItem("preferredLanguage")
          || document.documentElement.lang
          || "pt";
      }

      function saveNeuroMeditFeedback(answer) {
        const key = "neuromeditFeedback";
        const entry = {
          id: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
          source: params.get("source") || "unknown",
          practice: params.get("practice") || "unknown",
          status: params.get("status") || "unknown",
          answer,
          language: getFeedbackLanguage(),
          createdAt: new Date().toISOString(),
          path: window.location.pathname,
          params: window.location.search,
        };

        try {
          const existingRaw = localStorage.getItem(key);
          const existing = existingRaw ? JSON.parse(existingRaw) : [];
          const safeExisting = Array.isArray(existing) ? existing : [];
          safeExisting.push(entry);
          localStorage.setItem(key, JSON.stringify(safeExisting));
          return true;
        } catch (error) {
          console.warn("Could not save NeuroMedit feedback", error);
          try {
            localStorage.setItem(key, JSON.stringify([entry]));
            return true;
          } catch (storageError) {
            console.warn("Could not recreate NeuroMedit feedback storage", storageError);
          }
          return false;
        }
      }

      options?.addEventListener("click", (event) => {
        const button = event.target.closest("[data-feedback-completed]");
        if (!button) {
          return;
        }

        const saved = saveNeuroMeditFeedback(button.textContent.trim());
        options.querySelectorAll(".feedback-option").forEach((option) => {
          option.classList.toggle("is-selected", option === button);
        });

        document.body.classList.add("feedback-answered");
        feedbackCard?.classList.add("is-answered");
        if (question) {
          question.hidden = true;
        }
        if (options) {
          options.hidden = true;
        }
        if (feedbackActions) {
          feedbackActions.hidden = false;
        }

        if (saveStatus) {
          const savedKey = saved ? "feedback_thank_you" : "feedback_saved_fallback";
          saveStatus.textContent = typeof getTranslation === "function"
            ? getTranslation(getFeedbackLanguage(), savedKey)
            : "Obrigado. A tua resposta foi guardada.";
          saveStatus.hidden = false;
          requestAnimationFrame(() => {
            saveStatus.classList.add("is-visible");
          });
        }

      });
    })();
  </script>
  <script src="translations.js"></script>
  <script>
    (() => {
      const labels = {
        pt: {
          tense: "Mais tenso",
          repeat: "repetir sessão",
          home: "voltar ao início",
        },
        en: {
          tense: "More tense",
          repeat: "repeat session",
          home: "return home",
        },
        es: {
          tense: "Más tenso",
          repeat: "repetir sesión",
          home: "volver al inicio",
        },
        it: {
          tense: "Più teso",
          repeat: "ripeti sessione",
          home: "torna all'inizio",
        },
        ru: {
          tense: "Больше напряжения",
          repeat: "повторить сессию",
          home: "вернуться в начало",
        },
      };

      function getFeedbackLanguage() {
        return localStorage.getItem("neuromedit-language")
          || localStorage.getItem("preferredLanguage")
          || document.documentElement.lang
          || "pt";
      }

      function applyFeedbackLabels() {
        const language = labels[getFeedbackLanguage()] ? getFeedbackLanguage() : "en";
        const currentLabels = labels[language];
        const tenseOption = document.querySelector("[data-feedback-tense]");
        const repeatLink = document.querySelector("[data-feedback-repeat-label]");
        const homeLink = document.querySelector("[data-feedback-home-label]");

        if (tenseOption) tenseOption.textContent = currentLabels.tense;
        if (repeatLink) repeatLink.textContent = currentLabels.repeat;
        if (homeLink) homeLink.textContent = currentLabels.home;
      }

      applyFeedbackLabels();
      window.addEventListener("neuromedit:languagechange", applyFeedbackLabels);
    })();
  </script>
  <script src="header-nav.js"></script>
